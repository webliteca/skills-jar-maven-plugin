# GitHub Actions workflow for building and deploying
#
# - Push to main:  build + deploy SNAPSHOT to GitHub Packages
# - Push tag v*:   build + deploy release to Maven Central (GPG-signed)
#
# Required GitHub Organization Secrets (already configured in webliteca org):
#   GPG_PRIVATE_KEY        - Base64-encoded GPG private key
#   GPG_PASSPHRASE         - GPG key passphrase
#   MAVEN_CENTRAL_USERNAME - Maven Central portal API token username
#   MAVEN_CENTRAL_PASSWORD - Maven Central portal API token password
#
# Release process:
#   git tag v1.0.0
#   git push origin v1.0.0

name: Build and Deploy

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean verify --batch-mode -ntp

  deploy-github:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Deploy to GitHub Packages
        run: mvn -B clean deploy --batch-mode -ntp
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine Release Version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          overwrite-settings: true

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 --decode | gpg --batch --import
        env:
          GPG_TTY: /dev/null

      - name: Set Maven project version
        run: |
          mvn versions:set \
            -DnewVersion="${{ env.VERSION }}" \
            -DprocessAllModules=true \
            -DgenerateBackupPoms=false \
            --batch-mode \
            -ntp

      - name: Build and Deploy
        run: mvn -B clean deploy --batch-mode -ntp -Psign-artifacts -Dgpg.passphrase="$GPG_PASSPHRASE"
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}

      - name: Clean up GPG keys
        if: always()
        run: |
          gpg --batch --yes --delete-secret-and-public-keys $(gpg --list-secret-keys --keyid-format long | grep sec | awk '{print $2}' | cut -d'/' -f2) 2>/dev/null || true
          rm -rf ~/.gnupg
